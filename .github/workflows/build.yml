name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Board selection lives in sdkconfig.board.<slug>; add a board by
          # adding a config file and a matrix entry.
          - hardware: Waveshare ESP32-S3-ETH
            slug: waveshare-esp32-s3-eth
            target: esp32s3
            bootloader_offset: "0x0"
          - hardware: Olimex ESP32-POE-ISO
            slug: olimex-esp32-poe-iso
            target: esp32
            bootloader_offset: "0x1000"

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: esp-idf build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5
        target: ${{ matrix.target }}
        path: '.'
        command: idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.board.${{ matrix.slug }}" set-target ${{ matrix.target }} build merge-bin -o elrs-netpack-merged.bin

    - name: Upload merged firmware image
      uses: actions/upload-artifact@v4
      with:
        name: elrs-netpack-merged-${{ matrix.slug }}
        path: build/elrs-netpack-merged.bin

    - name: Upload individual firmware binaries
      uses: actions/upload-artifact@v4
      with:
        name: elrs-netpack-binaries-${{ matrix.slug }}
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/ota_data_initial.bin
          build/elrs-netpack.bin

    # Every push to main gets an auto-versioned release (v1.0.<run>); pushing
    # a tag (git tag v2.0.0) releases under that exact version instead.
    - name: Compute release version
      if: github.event_name == 'push'
      id: ver
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
        else
          echo "version=v1.0.$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
        fi

    - name: Package release assets
      if: github.event_name == 'push'
      env:
        HARDWARE: ${{ matrix.hardware }}
        HARDWARE_SLUG: ${{ matrix.slug }}
        CHIP: ${{ matrix.target }}
        BOOTLOADER_OFFSET: ${{ matrix.bootloader_offset }}
      run: |
        VERSION="${{ steps.ver.outputs.version }}"
        mkdir -p release
        cp build/elrs-netpack-merged.bin "release/elrs-netpack-${VERSION}-${HARDWARE_SLUG}-merged.bin"
        cp build/elrs-netpack.bin "release/elrs-netpack-${VERSION}-${HARDWARE_SLUG}-ota.bin"
        mkdir -p parts
        cp build/bootloader/bootloader.bin parts/
        cp build/partition_table/partition-table.bin parts/
        cp build/ota_data_initial.bin parts/
        cp build/elrs-netpack.bin parts/
        printf '%s\n' \
          "Individual binaries for esptool (board: ${HARDWARE}, chip: ${CHIP}):" \
          "" \
          "  esptool --chip ${CHIP} --port <PORT> --baud 921600 write_flash \\" \
          "    ${BOOTLOADER_OFFSET} bootloader.bin 0x8000 partition-table.bin \\" \
          "    0x10000 ota_data_initial.bin 0x20000 elrs-netpack.bin" \
          "" \
          "Most users should flash the single merged image at 0x0 instead," \
          "or update a running netpack over the network at http://elrs-netpack.local/" \
          "using the -ota.bin asset." \
          > parts/README.txt
        (cd parts && zip -j "../release/elrs-netpack-${VERSION}-${HARDWARE_SLUG}-binaries.zip" *)

    - name: Upload release assets
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.slug }}
        path: release/*

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Compute release version
      id: ver
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
        else
          echo "version=v1.0.$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
        fi

    - name: Download release assets
      uses: actions/download-artifact@v4
      with:
        pattern: release-*
        path: release
        merge-multiple: true

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.ver.outputs.version }}
        target_commitish: ${{ github.sha }}
        name: "ELRS Netpack ${{ steps.ver.outputs.version }}"
        files: release/*
        generate_release_notes: true
        body: |
          One firmware build per supported board — pick the assets whose name matches your hardware:

          | Board | Assets |
          | --- | --- |
          | **Waveshare ESP32-S3-ETH** (standard and PoE variants) | `…-waveshare-esp32-s3-eth-…` |
          | **Olimex ESP32-POE-ISO** (incl. `-EA`, and the non-ISO ESP32-POE) | `…-olimex-esp32-poe-iso-…` |

          ## Which file do I need?

          - `…-ota.bin` — for updating a Netpack **already running firmware with OTA support**: browse to `http://elrs-netpack.local/` (or the device's IP) and drag this file onto the update page. No USB needed.
          - `…-merged.bin` — the whole firmware in one file, for **USB flashing**. Flash it at offset `0x0`.
          - `…-binaries.zip` — the individual bootloader / partition-table / OTA-data / app binaries, for advanced use (offsets in the included README).

          Devices running firmware from before OTA support must be flashed once over USB; after that, updates can be installed from the browser.

          ## Flashing

          **Easiest (any OS):** open [espressif.github.io/esptool-js](https://espressif.github.io/esptool-js/) in Chrome or Edge → **Connect** → Flash Address `0x0` → choose your board's merged `.bin` → **Program**.

          **Command line** (install once with `pip install esptool`):

          ```bash
          # Waveshare ESP32-S3-ETH — native USB-C, no driver needed
          # (port: COMx / /dev/cu.usbmodem* / /dev/ttyACM0)
          esptool --chip esp32s3 --port <PORT> --baud 921600 write_flash 0x0 elrs-netpack-${{ steps.ver.outputs.version }}-waveshare-esp32-s3-eth-merged.bin

          # Olimex ESP32-POE-ISO — micro-USB via CH340 USB-serial
          # (port: COMx / /dev/cu.wchusbserial* / /dev/ttyUSB0; Windows/macOS may need the CH340 driver)
          esptool --chip esp32 --port <PORT> --baud 921600 write_flash 0x0 elrs-netpack-${{ steps.ver.outputs.version }}-olimex-esp32-poe-iso-merged.bin
          ```

          > [!WARNING]
          > On the **non-isolated** Olimex ESP32-POE, never have PoE Ethernet and USB connected at the same time — it can damage the board and your computer. The **ISO** variants are isolated and safe.

          If the flasher can't connect, hold the board's **BOOT** button (**BUT1** on the Olimex) while plugging in (or while clicking Connect), then release.

          Full step-by-step instructions for all platforms are in the [README](https://github.com/${{ github.repository }}#firmware-installation).
