<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELRS Netpack — Firmware</title>
<link rel="icon" href="data:,">
<style>
:root{
  /* AUFPV palette (aufpv.org.au): lime primary on near-black neutrals */
  --bg:#0f0f0f; --panel:#1a1a1a; --line:#252525;
  --ink:#eeeeee; --muted:#999999;
  --accent:#b6e925; --info:#00b4d8; --ok:#4ade80; --err:#f87171;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{
  min-height:100vh;display:flex;justify-content:center;
  font-family:var(--mono);color:var(--ink);
  padding:48px 20px;font-size:14px;line-height:1.5;
}
main{width:100%;max-width:560px}
.eyebrow{color:var(--accent);letter-spacing:.35em;font-size:11px;text-transform:uppercase}
h1{
  font-family:var(--sans);font-weight:800;font-size:34px;
  letter-spacing:.02em;margin:2px 0 28px;
}
h1 small{color:var(--muted);font-weight:400;font-size:16px;letter-spacing:0}
dl{
  display:grid;grid-template-columns:auto 1fr;gap:6px 24px;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  padding:14px 2px;margin-bottom:32px;
}
dt{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em;align-self:baseline}
dd{text-align:right;overflow-wrap:anywhere}
/* ── drop zone: OSD corner brackets ───────────────── */
#zone{
  position:relative;padding:3px;cursor:pointer;outline:none;
  -webkit-tap-highlight-color:transparent;
}
#zone .frame{
  position:relative;background:var(--panel);
  min-height:210px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;
  padding:32px 24px;text-align:center;
}
#zone::before,#zone::after,
#zone .frame::before,#zone .frame::after{
  content:"";position:absolute;width:26px;height:26px;
  border:0 solid var(--accent);pointer-events:none;
  transition:border-color .15s,transform .15s;
}
#zone::before{top:0;left:0;border-top-width:2px;border-left-width:2px}
#zone::after{top:0;right:0;border-top-width:2px;border-right-width:2px}
#zone .frame::before{bottom:-3px;left:-3px;border-bottom-width:2px;border-left-width:2px}
#zone .frame::after{bottom:-3px;right:-3px;border-bottom-width:2px;border-right-width:2px}
#zone:focus-visible::before,#zone:focus-visible::after{border-color:var(--ink)}
#zone.drag::before{transform:translate(-4px,-4px)}
#zone.drag::after{transform:translate(4px,-4px)}
#zone.drag .frame::before{transform:translate(-4px,4px)}
#zone.drag .frame::after{transform:translate(4px,4px)}
#zone.drag .frame{background:#1e2410}
.hint{color:var(--muted)}
.hint b{color:var(--ink);font-weight:400}
.browse{color:var(--accent);text-decoration:underline;text-underline-offset:3px}
#file{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}
.name{overflow-wrap:anywhere}
.size{color:var(--muted);font-size:12px}
/* big lap-clock percentage */
.pct{
  font-size:56px;font-weight:700;letter-spacing:.04em;
  font-variant-numeric:tabular-nums;color:var(--accent);
}
.bar{
  position:absolute;left:0;bottom:0;height:3px;width:100%;
  background:var(--line);overflow:hidden;
}
.bar i{
  display:block;height:100%;width:0;background:var(--accent);
  transition:width .2s linear;
}
button{
  font:inherit;border:1px solid var(--accent);background:none;
  color:var(--accent);padding:9px 22px;cursor:pointer;
  letter-spacing:.08em;text-transform:uppercase;font-size:12px;
}
button:hover{background:var(--accent);color:var(--bg)}
button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
button.ghost{border-color:var(--line);color:var(--muted)}
button.ghost:hover{background:none;color:var(--ink);border-color:var(--muted)}
.row{display:flex;gap:12px;margin-top:8px}
#status{margin-top:18px;min-height:22px}
#status.err{color:var(--err)}
#status.ok{color:var(--ok)}
#status.busy{color:var(--info)}
footer{margin-top:34px;color:var(--muted);font-size:12px}
footer a{display:block;margin-top:10px;color:var(--accent);text-decoration:none}
footer a:hover{text-decoration:underline;text-underline-offset:3px}
@keyframes blink{50%{opacity:.25}}
.blink{animation:blink 1.2s step-start infinite}
@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
}
</style>
</head>
<body>
<main>
  <p class="eyebrow">Firmware console</p>
  <h1>ELRS NETPACK <small id="ver"></small></h1>

  <dl id="info">
    <dt>Version</dt><dd id="i-version">—</dd>
    <dt>Built</dt><dd id="i-built">—</dd>
    <dt>Active slot</dt><dd id="i-slot">—</dd>
    <dt>ESP-IDF</dt><dd id="i-idf">—</dd>
  </dl>

  <div id="zone" role="button" tabindex="0" aria-label="Choose a firmware file">
    <div class="frame" id="frame"></div>
    <input type="file" id="file" accept=".bin">
  </div>

  <p id="status" role="status"></p>

  <footer>Updates install to the standby slot; the device reboots into the
  new firmware and keeps its network settings.
  <a href="/test">Goggle test console →</a></footer>
</main>

<script>
"use strict";
var zone=document.getElementById("zone"),frame=document.getElementById("frame"),
    input=document.getElementById("file"),statusEl=document.getElementById("status");
var slotSize=0,picked=null,uploading=false;

function h(tag,cls,text){var e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e}
function setStatus(cls,text){statusEl.className=cls;statusEl.textContent=text}
function fmtSize(b){return b>=1048576?(b/1048576).toFixed(2)+" MB":Math.round(b/1024)+" KB"}

function showIdle(){
  picked=null;
  var alt=h("p","hint","or ");
  alt.appendChild(h("span","browse","browse for a .bin file"));
  frame.replaceChildren(h("p","hint","Drop firmware here"),alt);
}
function showPicked(f){
  picked=f;
  var row=h("div","row"),go=h("button",null,"Install firmware"),no=h("button","ghost","Cancel");
  go.onclick=function(e){e.stopPropagation();upload()};
  no.onclick=function(e){e.stopPropagation();showIdle();setStatus("","")};
  row.append(go,no);
  frame.replaceChildren(h("p","name",f.name),h("p","size",fmtSize(f.size)),row);
}
function showProgress(){
  var pct=h("p","pct","0%"),bar=h("div","bar");bar.appendChild(h("i"));
  frame.replaceChildren(pct,h("p","hint","Writing to standby slot"),bar);
  return function(p){
    pct.textContent=Math.floor(p*100)+"%";
    bar.firstChild.style.width=(p*100)+"%";
  };
}

function pick(f){
  if(uploading||!f)return;
  if(!/\.bin$/i.test(f.name))return setStatus("err","Firmware images end in .bin — got “"+f.name+"”");
  if(slotSize&&f.size>slotSize)return setStatus("err","Image is larger than the OTA slot ("+fmtSize(slotSize)+")");
  setStatus("","");showPicked(f);
}

zone.addEventListener("click",function(){if(!uploading&&!picked)input.click()});
zone.addEventListener("keydown",function(e){if((e.key==="Enter"||e.key===" ")&&!uploading&&!picked){e.preventDefault();input.click()}});
input.addEventListener("change",function(){pick(input.files[0]);input.value=""});
["dragover","dragenter"].forEach(function(t){zone.addEventListener(t,function(e){e.preventDefault();if(!uploading)zone.classList.add("drag")})});
["dragleave","drop"].forEach(function(t){zone.addEventListener(t,function(e){e.preventDefault();zone.classList.remove("drag")})});
zone.addEventListener("drop",function(e){if(!uploading&&e.dataTransfer.files.length)pick(e.dataTransfer.files[0])});

function upload(){
  if(uploading||!picked)return;
  uploading=true;
  var setP=showProgress();
  setStatus("busy","Do not power off the device");
  var xhr=new XMLHttpRequest();
  xhr.open("POST","/api/update");
  xhr.upload.onprogress=function(e){if(e.lengthComputable)setP(e.loaded/e.total)};
  xhr.onerror=function(){fail("Upload failed — check the connection and try again")};
  xhr.onload=function(){
    var r={};try{r=JSON.parse(xhr.responseText)}catch(e){}
    if(xhr.status===200&&r.ok){
      frame.replaceChildren(h("p","pct","100%"),h("p","hint blink","Rebooting"));
      setStatus("busy","Update installed — waiting for the device to come back…");
      waitForReboot(r.version);
    }else fail(r.error||"Update failed (HTTP "+xhr.status+")");
  };
  xhr.send(picked);
}
function fail(msg){uploading=false;setStatus("err",msg);showIdle()}

function waitForReboot(newVer){
  var tries=0;
  var t=setInterval(function(){
    if(++tries>40){clearInterval(t);return fail("Device did not come back — check its power and network")}
    fetch("/api/info",{cache:"no-store"}).then(function(r){return r.json()}).then(function(d){
      clearInterval(t);uploading=false;fillInfo(d);showIdle();
      setStatus("ok","Back online — running "+(d.version||newVer));
    }).catch(function(){});
  },2000);
}

function fillInfo(d){
  slotSize=d.slot_size||0;
  document.getElementById("ver").textContent=d.version||"";
  document.getElementById("i-version").textContent=d.version||"?";
  document.getElementById("i-built").textContent=d.built||"?";
  document.getElementById("i-slot").textContent=d.slot||"?";
  document.getElementById("i-idf").textContent=d.idf||"?";
}
fetch("/api/info").then(function(r){return r.json()}).then(fillInfo)
  .catch(function(){setStatus("err","Could not read device info")});
showIdle();
</script>
</body>
</html>
